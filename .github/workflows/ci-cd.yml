name: CI/CD

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync

      - name: Run tests
        run: uv run pytest

  deploy:
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push app image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.ACR_IMAGE_NAME }}:${{ github.sha }}
            ${{ secrets.ACR_IMAGE_NAME }}:latest

      - name: Configure SSH
        env:
          PROD_SSH_KEY: ${{ secrets.PROD_SSH_KEY }}
          PROD_HOST: ${{ secrets.PROD_HOST }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$PROD_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$PROD_HOST" >> ~/.ssh/known_hosts

      - name: Deploy to production
        env:
          PROD_USER: ${{ secrets.PROD_USER }}
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_DEPLOY_DIR: ${{ secrets.PROD_DEPLOY_DIR }}
          ACR_REGISTRY: ${{ secrets.ACR_REGISTRY }}
          ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
          ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
          APP_IMAGE_NAME: ${{ secrets.ACR_IMAGE_NAME }}
          APP_IMAGE_TAG: ${{ github.sha }}
        run: |
          set -euo pipefail
          printf '%s\n' "$ACR_PASSWORD" \
            | ssh -i ~/.ssh/deploy_key "$PROD_USER@$PROD_HOST" \
                "docker login '$ACR_REGISTRY' --username '$ACR_USERNAME' --password-stdin"
          tar -czf - \
            deploy/docker-compose.yml \
            deploy/nginx.conf \
            scripts/backup-postgres-compose.sh \
            scripts/deploy-production.sh \
            | ssh -i ~/.ssh/deploy_key "$PROD_USER@$PROD_HOST" \
                "mkdir -p '$PROD_DEPLOY_DIR' && cd '$PROD_DEPLOY_DIR' && tar -xzf - && chmod +x scripts/backup-postgres-compose.sh scripts/deploy-production.sh && APP_IMAGE_NAME='$APP_IMAGE_NAME' APP_IMAGE_TAG='$APP_IMAGE_TAG' scripts/deploy-production.sh && printf '%s\n' '$APP_IMAGE_TAG' > .deployed-revision"
