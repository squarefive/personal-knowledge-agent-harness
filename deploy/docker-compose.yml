services:
  app:
    build:
      context: ..
      dockerfile: Dockerfile
    environment:
      PKA_CLOUD_ONLY: "true"
      DATABASE_URL_FILE: /run/secrets/database_url
      ALLOWED_LOGIN_EMAILS: ${ALLOWED_LOGIN_EMAILS:-1033795760@qq.com}
      DEEPSEEK_API_KEY_FILE: /run/secrets/deepseek_api_key
      DASHSCOPE_API_KEY_FILE: /run/secrets/dashscope_api_key
      SMTP_HOST: smtp.qq.com
      SMTP_PORT: "465"
      SMTP_SSL: "true"
      SMTP_USER: ${SMTP_USER:-1033795760@qq.com}
      SMTP_PASSWORD_FILE: /run/secrets/smtp_password
      MAIL_FROM: ${MAIL_FROM:-1033795760@qq.com}
      SESSION_SECRET_FILE: /run/secrets/session_secret
    secrets:
      - database_url
      - deepseek_api_key
      - dashscope_api_key
      - smtp_password
      - session_secret
    command: ["sh", "-c", "python scripts/init-postgres-schema.py && python -m personal_knowledge_agent web --host 0.0.0.0 --port 8787 --no-open"]
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "8787"

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: pka
      POSTGRES_USER: pka
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    secrets:
      - postgres_password
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pka -d pka"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - app
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres-data:

secrets:
  database_url:
    file: ./secrets/database_url
  deepseek_api_key:
    file: ./secrets/deepseek_api_key
  dashscope_api_key:
    file: ./secrets/dashscope_api_key
  smtp_password:
    file: ./secrets/smtp_password
  session_secret:
    file: ./secrets/session_secret
  postgres_password:
    file: ./secrets/postgres_password
